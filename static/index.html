<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF2LLMWiki</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: #2e3450;
    --accent: #6c8ef7;
    --accent2: #4ecdc4;
    --text: #e8eaf0;
    --muted: #7880a0;
    --success: #4ecdc4;
    --warn: #f7c948;
    --danger: #f76c6c;
    --mono: 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    font-size: 14px;
    line-height: 1.6;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .02em; }
  header h1 span { color: var(--accent); }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background .3s;
  }
  .status-dot.ok { background: var(--success); }
  .status-dot.err { background: var(--danger); }

  .status-label { font-size: 12px; color: var(--muted); }

  .lang-switcher {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }
  .lang-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 14px;
    cursor: pointer;
    opacity: .5;
    transition: opacity .2s, border-color .2s;
    line-height: 1;
  }
  .lang-btn:hover { opacity: .8; }
  .lang-btn.active { opacity: 1; border-color: var(--border); background: var(--bg3); }

  .model-badge {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--accent);
    font-family: var(--mono);
  }

  main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    overflow: hidden;
    height: calc(100vh - 52px - 36px);
  }

  .panel-left {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .panel-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-section h2 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(108,142,247,.06);
  }
  .dropzone.has-file { border-color: var(--success); border-style: solid; }
  .dropzone input { display: none; }

  .drop-icon { font-size: 32px; margin-bottom: 8px; opacity: .6; }
  .drop-label { font-size: 13px; color: var(--muted); }
  .drop-label strong { color: var(--text); }
  .file-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--success);
    margin-top: 8px;
    word-break: break-all;
  }

  .opts { display: flex; flex-direction: column; gap: 10px; }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .field select, .field input[type="number"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  .field select:focus, .field input:focus { border-color: var(--accent); }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }

  .toggle {
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background .2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: left .2s;
  }
  .toggle.on::after { left: 19px; }

  .btn-convert {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    letter-spacing: .02em;
  }
  .btn-convert:hover:not(:disabled) { opacity: .9; }
  .btn-convert:active:not(:disabled) { transform: scale(.99); }
  .btn-convert:disabled { opacity: .4; cursor: not-allowed; }

  .btn-stop {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
    letter-spacing: .02em;
    display: none;
    margin-top: 8px;
  }
  .btn-stop:hover { background: rgba(247,108,108,.1); }

  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn-sm {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  .mode-selector { display: flex; gap: 8px; }
  .mode-btn {
    flex: 1;
    padding: 8px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: border-color .2s, color .2s, background .2s;
    user-select: none;
  }
  .mode-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(108,142,247,.08);
  }

  #llmOptions { display: flex; flex-direction: column; gap: 10px; }

  .progress {
    display: none;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }
  .progress.active { display: block; }
  .progress-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width .4s ease;
    animation: indeterminate 1.5s infinite;
  }
  @keyframes indeterminate {
    0% { width: 10%; margin-left: 0; }
    50% { width: 40%; margin-left: 30%; }
    100% { width: 10%; margin-left: 90%; }
  }
  .progress-bar-fill.done { animation: none; width: 100%; background: var(--success); }
  .progress-step { font-size: 12px; color: var(--muted); }


  .stats {
    display: none;
    padding: 14px 20px;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .stats.active { display: flex; }
  .stat-item { display: flex; flex-direction: column; }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--accent2); font-variant-numeric: tabular-nums; }
  .stat-key { font-size: 11px; color: var(--muted); }

  .panel-right { display: flex; flex-direction: column; overflow: hidden; }

  .preview-toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tab-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 4px 12px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .tab-btn.active {
    border-color: var(--border);
    color: var(--text);
    background: var(--bg3);
  }

  .btn-copy, .btn-dl {
    margin-left: auto;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .btn-copy:hover, .btn-dl:hover { border-color: var(--accent); color: var(--accent); }
  .btn-dl { margin-left: 6px; }

  .preview-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
    color: var(--text);
    background: var(--bg);
  }

  .preview-content.rendered { font-family: system-ui, sans-serif; font-size: 14px; white-space: normal; }

  .preview-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--muted);
    font-size: 13px;
    flex-direction: column;
    gap: 8px;
  }
  .preview-empty .empty-icon { font-size: 40px; opacity: .3; }

  .md-rendered h1 { font-size: 20px; font-weight: 700; margin: 20px 0 10px; color: var(--accent); }
  .md-rendered h2 { font-size: 16px; font-weight: 600; margin: 16px 0 8px; color: var(--accent2); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .md-rendered h3 { font-size: 14px; font-weight: 600; margin: 12px 0 6px; }
  .md-rendered p { margin: 8px 0; }
  .md-rendered code { background: var(--bg3); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 12px; }
  .md-rendered pre { background: var(--bg3); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
  .md-rendered pre code { background: none; padding: 0; }
  .md-rendered table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 12px; }
  .md-rendered th, .md-rendered td { border: 1px solid var(--border); padding: 6px 10px; }
  .md-rendered th { background: var(--bg3); }
  .md-rendered ul, .md-rendered ol { padding-left: 20px; margin: 8px 0; }
  .md-rendered blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 8px 0; }
  .wikilink { color: var(--accent); font-weight: 500; }
  .md-rendered .frontmatter { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 16px; font-family: var(--mono); font-size: 12px; color: var(--muted); }

  footer {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 8px 28px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .toast {
    position: fixed; bottom: 50px; right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(8px);
    transition: all .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #modalOverlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  #modalOverlay.visible { opacity: 1; pointer-events: all; }
  #modalDialog {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px 24px;
    max-width: 360px;
    width: 92%;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
    transform: translateY(12px) scale(.97);
    transition: transform .2s, opacity .2s;
    opacity: 0;
  }
  #modalOverlay.visible #modalDialog { transform: translateY(0) scale(1); opacity: 1; }
  #modalIcon { font-size: 36px; text-align: center; margin-bottom: 14px; }
  #modalTitle { font-size: 15px; font-weight: 600; color: var(--text); text-align: center; margin-bottom: 8px; }
  #modalMsg { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.7; margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn-cancel {
    flex: 1; padding: 10px 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); cursor: pointer; font-size: 13px;
    transition: border-color .15s, color .15s;
  }
  .modal-btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .modal-btn-ok {
    flex: 1; padding: 10px 14px;
    background: var(--accent); border: none; border-radius: 8px;
    color: white; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: opacity .15s;
  }
  .modal-btn-ok:hover { opacity: .85; }
</style>
</head>
<body>

<header>
  <div class="status-dot" id="statusDot"></div>
  <h1>PDF<span>2</span>LLMWiki</h1>
  <span class="status-label" id="statusLabel" data-i18n="status.checking"></span>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('fr')" id="langFr">🇫🇷</button>
    <button class="lang-btn" onclick="setLang('en')" id="langEn">🇬🇧</button>
    <button class="lang-btn" onclick="setLang('es')" id="langEs">🇪🇸</button>
  </div>
  <span class="model-badge" id="modelBadge">—</span>
</header>

<main>
  <div class="panel-left">

    <div class="panel-section">
      <h2 data-i18n="section.pdf"></h2>
      <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".pdf">
        <div class="drop-icon">📄</div>
        <div class="drop-label" id="dropLabel" data-i18n-html="drop.label"></div>
        <div class="file-name" id="fileName"></div>
      </div>
    </div>

    <div class="panel-section">
      <h2 data-i18n="section.options"></h2>
      <div class="opts">
        <div class="field">
          <label data-i18n="mode.label"></label>
          <div class="mode-selector">
            <div class="mode-btn selected" id="modeDetailed" onclick="setMode('detailed')" data-i18n="mode.detailed"></div>
            <div class="mode-btn" id="modeRaw" onclick="setMode('raw')" data-i18n="mode.raw"></div>
          </div>
        </div>
        <div id="llmOptions">
          <div class="field">
            <label data-i18n="opt.model"></label>
            <select id="optModel" onchange="lastModelUsed=null; updateBadge()">
              <option value="" data-i18n="opt.model.loading"></option>
            </select>
          </div>
          <div style="text-align:right; margin-top:-2px;">
            <a href="#" id="installToggle" onclick="toggleInstall();return false"
               style="font-size:11px;color:var(--muted);text-decoration:none;transition:color .15s;"
               onmouseover="this.style.color='var(--accent)'"
               onmouseout="this.style.color='var(--muted)'"
               data-i18n="install.toggle"></a>
          </div>
          <div id="installSection" style="display:none;flex-direction:column;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;">
            <div style="font-size:11px;color:var(--warn);" data-i18n="install.warn"></div>
            <div style="display:flex;gap:8px;">
              <input type="text" id="installInput" list="modelSuggestions"
                     style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;"
                     onfocus="this.style.borderColor='var(--accent)'"
                     onblur="this.style.borderColor='var(--border)'"
                     data-i18n-placeholder="install.placeholder">
              <datalist id="modelSuggestions">
                <option value="qwen2.5:7b"></option>
                <option value="mistral:7b"></option>
                <option value="llama3.2:3b"></option>
                <option value="mistral:7b-instruct-q4_K_M"></option>
                <option value="gemma3:4b"></option>
                <option value="phi4-mini:3.8b"></option>
              </datalist>
              <button id="installBtn" onclick="installModel()"
                      style="padding:6px 12px;background:var(--accent);border:none;border-radius:6px;color:white;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s;"
                      onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'"
                      data-i18n="install.btn"></button>
            </div>
            <div id="installProgress" style="display:none;">
              <div class="progress-bar-track" style="margin-bottom:6px;">
                <div id="installFill" style="height:4px;background:var(--accent);border-radius:2px;width:0%;transition:width .3s;"></div>
              </div>
              <div id="installStatus" style="font-size:11px;color:var(--muted);font-family:var(--mono);"></div>
            </div>
          </div>

          <div class="field">
            <label data-i18n="opt.lang"></label>
            <select id="optLang">
              <option value="fr">Français</option>
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="de">Deutsch</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="opt.tags"></label>
            <input type="number" id="optTags" value="8" min="3" max="20">
          </div>
        </div>
        <div class="toggle-row">
          <span data-i18n="opt.chunks"></span>
          <div class="toggle" id="toggleChunks" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>
    </div>

    <div class="panel-section" style="border-bottom:none; padding-top:16px;">
      <button class="btn-convert" id="btnConvert" onclick="startConvert()" disabled data-i18n="btn.convert"></button>
      <button class="btn-stop" id="btnStop" onclick="stopConvert()" data-i18n="btn.stop"></button>
      <div class="btn-row">
        <button class="btn-sm" onclick="resetUI()" data-i18n="btn.new"></button>
        <button class="btn-sm" onclick="location.reload()" data-i18n="btn.reload"></button>
      </div>
    </div>

    <div class="progress" id="progressBar">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-step" id="progressStep"></div>
    </div>

    <div class="stats" id="statsPanel">
      <div class="stat-item"><span class="stat-val" id="statPages">—</span><span class="stat-key" data-i18n="stat.pages"></span></div>
      <div class="stat-item"><span class="stat-val" id="statSections">—</span><span class="stat-key" data-i18n="stat.sections"></span></div>
      <div class="stat-item"><span class="stat-val" id="statChars">—</span><span class="stat-key" data-i18n="stat.chars"></span></div>
      <div class="stat-item"><span class="stat-val" id="statChunks">—</span><span class="stat-key" data-i18n="stat.chunks"></span></div>
    </div>

  </div>

  <div class="panel-right">
    <div class="preview-toolbar">
      <button class="tab-btn active" id="tabRaw" onclick="setTab('raw')" data-i18n="tab.raw"></button>
      <button class="tab-btn" id="tabRendered" onclick="setTab('rendered')" data-i18n="tab.rendered"></button>
      <button class="tab-btn" id="tabChunks" onclick="setTab('chunks')" style="display:none" data-i18n="tab.chunks"></button>
      <button class="btn-copy" onclick="copyMd()" data-i18n="btn.copy"></button>
      <button class="btn-dl" id="btnDl" onclick="downloadMd()" style="display:none" data-i18n="btn.dl"></button>
    </div>

    <div id="previewEmpty" class="preview-empty">
      <div class="empty-icon">🗂</div>
      <span data-i18n="empty"></span>
    </div>

    <div id="previewRaw" class="preview-content" style="display:none"></div>
    <div id="previewRendered" class="preview-content rendered md-rendered" style="display:none"></div>
    <div id="previewChunks" class="preview-content" style="display:none"></div>
  </div>
</main>

<footer>
  <span data-i18n="footer.local"></span>
  <span id="footerPath" style="font-family:monospace"></span>
  <a href="https://ko-fi.com/lorenzovirgosfrediani" target="_blank" rel="noopener"
     style="margin-left:auto; display:flex; align-items:center; gap:6px; text-decoration:none; color:var(--muted); font-size:11px; transition:color .2s;"
     onmouseover="this.style.color='var(--warn)'" onmouseout="this.style.color='var(--muted)'"
     data-i18n="footer.kofi"></a>
</footer>

<div id="modalOverlay" onclick="if(event.target===this) closeModal(false)">
  <div id="modalDialog">
    <div id="modalIcon">⚠️</div>
    <div id="modalTitle" data-i18n="modal.title"></div>
    <div id="modalMsg"></div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" id="modalCancel" onclick="closeModal(false)"></button>
      <button class="modal-btn-ok"     id="modalOk"     onclick="closeModal(true)"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── i18n ────────────────────────────────────────────────────────────────────
const TRANSLATIONS = {
  fr: {
    'status.checking':   'vérification Ollama…',

let lang = localStorage.getItem('ui-lang') || 'fr';

function t(key, vars = {}) {
  let s = (TRANSLATIONS[lang] || TRANSLATIONS.fr)[key] || key;
  for (const [k, v] of Object.entries(vars)) s = s.replace(`{${k}}`, v);
  return s;
}

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    el.innerHTML = t(el.dataset.i18nHtml);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  ['langFr','langEn','langEs'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('lang' + lang.charAt(0).toUpperCase() + lang.slice(1)).classList.add('active');
  // Status label si pas connecté encore
  if (!document.getElementById('statusDot').classList.contains('ok')) {
    document.getElementById('statusLabel').textContent = t('status.checking');
  }
}

function setLang(l) {
  lang = l;
  localStorage.setItem('ui-lang', l);
  applyLang();
}

// ─── Badge ───────────────────────────────────────────────────────────────────
function updateBadge() {
  const badge = document.getElementById('modelBadge');
  if (currentMode === 'raw') {
    badge.textContent = '— (brut)';
  } else {
    const sel = document.getElementById('optModel').value;
    badge.textContent = lastModelUsed || sel || configModel;
  }
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeDetailed').classList.toggle('selected', mode === 'detailed');
  document.getElementById('modeRaw').classList.toggle('selected', mode === 'raw');
  document.getElementById('llmOptions').style.display = mode === 'raw' ? 'none' : '';
  updateBadge();
}

// ─── Installation modèle ─────────────────────────────────────────────────────
function toggleInstall() {
  const sec = document.getElementById('installSection');
  const lnk = document.getElementById('installToggle');
  const open = sec.style.display === 'flex';
  sec.style.display = open ? 'none' : 'flex';
  lnk.textContent = open ? t('install.toggle') : t('install.hide');
}

async function installModel() {
  const name = document.getElementById('installInput').value.trim();
  if (!name) return;

  const btn    = document.getElementById('installBtn');
  const prog   = document.getElementById('installProgress');
  const fill   = document.getElementById('installFill');
  const status = document.getElementById('installStatus');

  btn.disabled = true;
  prog.style.display = 'block';
  fill.style.width = '0%';
  fill.style.background = 'var(--accent)';
  status.style.color = 'var(--muted)';
  status.textContent = t('install.downloading');

  try {
    const body = new URLSearchParams({ model: name });
    const res  = await fetch('/api/pull', { method: 'POST', body });
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const d = JSON.parse(line.slice(6));
        if (d.error) {
          status.textContent = t('install.error') + d.error;
          status.style.color = 'var(--danger)';
          fill.style.background = 'var(--danger)';
          break;
        }
        if (d.done) {
          fill.style.width = '100%';
          fill.style.background = 'var(--success)';
          status.textContent = t('install.done');
          status.style.color = 'var(--success)';
          await checkStatus();
          const sel  = document.getElementById('optModel');
          const opts = Array.from(sel.options);
          const hit  = opts.find(o => o.value === name || o.value.startsWith(name.split(':')[0]));
          if (hit) { sel.value = hit.value; lastModelUsed = null; updateBadge(); }
          break;
        }
        if (d.status) status.textContent = d.status;
        if (d.percent !== undefined) fill.style.width = d.percent + '%';
      }
    }
  } catch (e) {
    status.textContent = t('install.error') + e.message;
    status.style.color = 'var(--danger)';
  }
  btn.disabled = false;
}

// ─── Modèles installés ───────────────────────────────────────────────────────
function populateModelSelect(modelList, currentModel) {
  const sel = document.getElementById('optModel');
  const prev = sel.value;
  sel.innerHTML = '';

  const defOpt = document.createElement('option');
  defOpt.value = '';
  defOpt.textContent = modelList.length
    ? t('opt.model.default')
    : t('opt.model.none');
  sel.appendChild(defOpt);

  modelList.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name === currentModel ? name + ' ★' : name;
    sel.appendChild(opt);
  });

  if (modelList.includes(prev)) sel.value = prev;
  updateBadge();
}

// ─── Status Ollama ───────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    const dot = document.getElementById('statusDot');
    const label = document.getElementById('statusLabel');
    if (d.ollama) {
      dot.className = 'status-dot ok';
      label.textContent = t('status.active') + d.models;
      configModel = d.current_model || '—';
      populateModelSelect(d.model_list || [], d.current_model);
    } else {
      dot.className = 'status-dot err';
      label.textContent = t('status.notfound');
      populateModelSelect([], null);
    }
    updateBadge();
  } catch(e) {
    document.getElementById('statusLabel').textContent = t('status.unreachable');
  }
}

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.pdf')) setFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

function setFile(f) {
  currentFilename = f.name;
  document.getElementById('fileName').textContent = f.name;
  dropzone.classList.add('has-file');
  document.getElementById('btnConvert').disabled = false;
}

let _modalResolve = null;

function showModal(msg) {
  return new Promise(resolve => {
    _modalResolve = resolve;
    document.getElementById('modalMsg').textContent = msg;
    document.getElementById('modalCancel').textContent = t('modal.cancel');
    document.getElementById('modalOk').textContent = t('modal.ok');
    document.getElementById('modalOverlay').classList.add('visible');
    document.getElementById('modalOk').focus();
  });
}

function closeModal(result) {
  document.getElementById('modalOverlay').classList.remove('visible');
  if (_modalResolve) { _modalResolve(result); _modalResolve = null; }
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('modalOverlay').classList.contains('visible')) return;
  if (e.key === 'Escape') closeModal(false);
  if (e.key === 'Enter')  closeModal(true);
});

// ─── Conversion ──────────────────────────────────────────────────────────────
async function startConvert() {
  if (!currentFilename) return;
  if (currentMd) {
    const ok = await showModal(t('conv.confirm'));
    if (!ok) return;
    clearRightPanel();
  }
  // Ferme la section install si ouverte pour libérer l'espace
  const installSec = document.getElementById('installSection');
  if (installSec && installSec.style.display === 'flex') toggleInstall();
  const btn = document.getElementById('btnConvert');
  const btnStop = document.getElementById('btnStop');
  btn.disabled = true;
  btnStop.style.display = 'block';

  const steps = t('steps');
  const progress = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const stepEl = document.getElementById('progressStep');
  progress.classList.add('active');
  fill.className = 'progress-bar-fill';
  let stepIdx = 0;
  stepEl.textContent = steps[0];
  const stepInterval = setInterval(() => {
    if (stepIdx < steps.length - 1) stepEl.textContent = steps[++stepIdx];
  }, 4000);

  try {
    const formData = new FormData();
    formData.append('file', fileInput.files[0] || new Blob(), currentFilename);
    const model = document.getElementById('optModel').value;
    if (model) formData.append('model', model);
    formData.append('language', document.getElementById('optLang').value);
    formData.append('max_tags', document.getElementById('optTags').value);
    formData.append('add_chunks', document.getElementById('toggleChunks').classList.contains('on') ? 'true' : 'false');
    formData.append('mode', currentMode);

    abortController = new AbortController();
    const r = await fetch('/api/convert', { method: 'POST', body: formData, signal: abortController.signal });
    clearInterval(stepInterval);

    if (!r.ok) {
      let detail = 'Erreur serveur ' + r.status;
      try { const err = await r.json(); detail = err.detail || detail; } catch {}
      throw new Error(detail);
    }

    const data = await r.json();
    currentMd = data.markdown;
    chunksData = data.chunks || [];

    fill.className = 'progress-bar-fill done';
    stepEl.textContent = t('conv.done');
    abortController = null;
    btnStop.style.display = 'none';
    lastModelUsed = data.model_used;
    document.getElementById('modelBadge').textContent = data.model_used;

    const stats = data.stats;
    document.getElementById('statPages').textContent = stats.pages;
    document.getElementById('statSections').textContent = stats.sections_extracted;
    document.getElementById('statChars').textContent = (stats.md_chars/1000).toFixed(1)+'k';
    document.getElementById('statChunks').textContent = stats.chunks;
    document.getElementById('statsPanel').classList.add('active');

    document.getElementById('previewEmpty').style.display = 'none';
    document.getElementById('previewRaw').style.display = 'block';
    document.getElementById('previewRaw').textContent = currentMd;
    if (chunksData.length > 0) document.getElementById('tabChunks').style.display = '';
    document.getElementById('btnDl').style.display = '';
    document.getElementById('footerPath').textContent = data.output_path;
    setTab('raw');
    showToast('✓ ' + data.filename, 'success');

  } catch(e) {
    clearInterval(stepInterval);
    const aborted = e.name === 'AbortError';
    fill.style.background = aborted ? 'var(--warn)' : 'var(--danger)';
    stepEl.textContent = aborted ? t('conv.stopped') : t('conv.error') + e.message;
    if (!aborted) showToast(e.message, 'error');
    abortController = null;
    btnStop.style.display = 'none';
  }

  setTimeout(() => btn.disabled = false, 1000);
}

// ─── Tabs ────────────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  ['raw','rendered','chunks'].forEach(t => {
    document.getElementById('preview'+cap(t)).style.display = 'none';
    document.getElementById('tab'+cap(t))?.classList.remove('active');
  });
  if (tab === 'rendered') {
    const el = document.getElementById('previewRendered');
    el.style.display = 'block';
    el.innerHTML = renderMd(currentMd);
  } else if (tab === 'chunks') {
    const el = document.getElementById('previewChunks');
    el.style.display = 'block';
    el.textContent = chunksData.map((c,i) =>
      `--- Chunk ${i+1} [${c.section}] (${c.chars} chars) ---\n${c.content}`
    ).join('\n\n');
  } else {
    document.getElementById('previewRaw').style.display = 'block';
  }
  document.getElementById('tab'+cap(tab))?.classList.add('active');
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ─── Rendu MD ────────────────────────────────────────────────────────────────
function renderMd(md) {
  let html = '';
  const lines = md.split('\n');
  let inFrontmatter = false, fmLines = [], inPre = false, preLines = [];
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    if (i === 0 && l === '---') { inFrontmatter = true; continue; }
    if (inFrontmatter) {
      if (l === '---') { inFrontmatter = false; html += '<div class="frontmatter">'+fmLines.join('\n')+'</div>'; }
      else fmLines.push(l);
      continue;
    }
    if (l.startsWith('```')) {
      if (!inPre) { inPre = true; preLines = []; }
      else { inPre = false; html += '<pre><code>'+esc(preLines.join('\n'))+'</code></pre>'; }
      continue;
    }
    if (inPre) { preLines.push(l); continue; }
    let line = esc(l);
    line = line.replace(/\[\[([^\]]+)\]\]/g, '<span class="wikilink">[[$1]]</span>');
    line = line.replace(/`([^`]+)`/g, '<code>$1</code>');
    line = line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    line = line.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    if (/^# /.test(l)) html += '<h1>'+line.slice(2)+'</h1>';
    else if (/^## /.test(l)) html += '<h2>'+line.slice(3)+'</h2>';
    else if (/^### /.test(l)) html += '<h3>'+line.slice(4)+'</h3>';
    else if (/^\|/.test(l)) html += line + '<br>';
    else if (/^- /.test(l)) html += '<li>'+line.slice(2)+'</li>';
    else if (l.trim() === '') html += '<br>';
    else html += '<p>'+line+'</p>';
  }
  return html;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Actions ─────────────────────────────────────────────────────────────────
function copyMd() {
  if (!currentMd) return;
  navigator.clipboard.writeText(currentMd).then(() => showToast(t('copied'), 'success'));
}

function downloadMd() {
  if (!currentMd) return;
  const blob = new Blob([currentMd], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFilename.replace('.pdf', '.md');
  a.click();
}

function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 3000);
}

// ─── Init ────────────────────────────────────────────────────────────────────
applyLang();
updateBadge();
checkStatus();
setInterval(checkStatus, 15000);
</script>
